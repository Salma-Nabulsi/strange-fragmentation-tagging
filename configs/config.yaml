paths:
  root_file: "data/DTT_Kmunu_small.root"
  tree_name: "DecayTree"
  output_dir: "outputs"

branches:
  features:
    - Tr_AALLSAMEBPV
    - Tr_ACHI2DOCA
    - Tr_ADOCA
    - Tr_BPVIP
    - Tr_BPVIPCHI2
    - Tr_Charge
    - Tr_E
    - Tr_EcalE
    - Tr_Eta
    - Tr_HcalE
    - Tr_MinIP
    - Tr_MinIPChi2
    - Tr_ORIG_FLAGS
    - Tr_P
    - Tr_PIDK
    - Tr_PIDe
    - Tr_PIDmu
    - Tr_PIDp
    - Tr_PROBNNe
    - Tr_PROBNNk
    - Tr_PROBNNmu
    - Tr_PROBNNp
    - Tr_PROBNNpi
    - Tr_PT
    - Tr_PZ
    - Tr_Phi
    - Tr_PrsE
    - Tr_THETA
    - Tr_TRCHI2DOF
    - Tr_TRFITMATCHCHI2
    - Tr_TRFITTCHI2
    - Tr_TRFITVELOCHI2NDOF
    - Tr_TRGHOSTPROB
    - Tr_TRTYPE
    - Tr_TrFIRSTHITZ
    - Tr_TrFITTCHI2NDOF
    - Tr_VeloCharge
  label_branch: Tr_MC_ID

training:
  random_state: 42
  test_size: 0.20
  val_size: 0.25
  undersample_ratios: [5, 10, 20, 50]
  label_smoothing: 0.9
  use_focal: true
  use_smote: true
  run_optuna: true
  n_optuna_trials: 80

stage1:
  n_estimators: 3000
  learning_rate: 0.03
  max_depth: 4
  subsample: 0.8
  colsample_bytree: 0.8
  reg_lambda: 3.0
  reg_alpha: 1.0
  min_child_weight: 1.0
  gamma: 0.0
  early_stopping_rounds: 100
  focal_gamma: 2.0
  focal_alpha: 0.25

stage2:
  n_estimators: 500
  learning_rate: 0.05
  max_depth: 3
  subsample: 0.8
  colsample_bytree: 0.8
  early_stopping_rounds: 50

cross_validation:
  n_splits: 5
  n_boot: 1000

plotting:
  col_kaon: "#1F77B4"
  col_trad: "#D62728"
  col_cut:  "#2CA02C"
  alpha_band: 0.18
